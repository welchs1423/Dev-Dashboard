name: Daily Job Scraping

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
# --------------------------------------------------------

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4로 업데이트 (경고 해결)

      - name: Set up Python
        uses: actions/setup-python@v5 # v5로 업데이트 (경고 해결)
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs_data.json
          git commit -m "auto: 매일 채용 공고 업데이트" || exit 0
          git push
